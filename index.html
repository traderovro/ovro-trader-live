<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ovro Trader UI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <h1>OVRO TRADER</h1>
  </div>

  <!-- Signal Card -->
  <div class="signal-card">
    <p class="title">OVRO TRADER SIGNAL</p>
    <h1 id="signal">BIG</h1>
    <p class="timer">Next: <span id="timer">00:30</span></p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="active">30s</button>
    <button>1min</button>
    <button>3min</button>
    <button>5min</button>
  </div>

  <!-- Color Buttons -->
  <div class="colors">
    <button class="green">Green</button>
    <button class="violet">Violet</button>
    <button class="red">Red</button>
  </div>

  <!-- Number Buttons -->
  <div class="numbers">
    <button class="violet">0</button>
    <button class="green">1</button>
    <button class="red">2</button>
    <button class="green">3</button>
    <button class="red">4</button>
    <button class="violet">5</button>
    <button class="red">6</button>
    <button class="green">7</button>
    <button class="red">8</button>
    <button class="green">9</button>
  </div>

</div>

<script src="script.js"></script>
</body>
  </html>
